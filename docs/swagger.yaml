basePath: /
definitions:
  article.CreateArticleRequest:
    properties:
      category_id:
        type: integer
      content_md:
        type: string
      cover_image:
        type: string
      slug:
        type: string
      status:
        type: string
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        type: string
    type: object
  article.UpdateArticleRequest:
    properties:
      category_id:
        type: integer
      content_md:
        type: string
      cover_image:
        type: string
      id:
        type: integer
      slug:
        type: string
      status:
        type: string
      summary:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      title:
        type: string
    type: object
  auth.UserLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  category.CreateCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  tag.CreateTagRequest:
    properties:
      description:
        type: string
      name:
        type: string
      slug:
        type: string
    type: object
info:
  contact: {}
  description: Personal site backend API for learning Hertz, Kitex and future evolution.
  title: Personal Site API
  version: "1.0"
paths:
  /api/admin/articles:
    get:
      consumes:
      - application/json
      description: 获取后台文章列表，包含草稿和已发布文章
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取后台文章列表
      tags:
      - article-admin
    post:
      consumes:
      - application/json
      description: 创建一篇新文章
      parameters:
      - description: 创建文章请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/article.CreateArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 创建文章
      tags:
      - article-admin
  /api/admin/articles/{id}:
    delete:
      consumes:
      - application/json
      description: 根据文章 ID 删除文章
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 删除文章
      tags:
      - article-admin
    put:
      consumes:
      - application/json
      description: 根据文章 ID 更新文章内容
      parameters:
      - description: 文章 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新文章请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/article.UpdateArticleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 更新文章
      tags:
      - article-admin
  /api/admin/categories:
    get:
      consumes:
      - application/json
      description: 获取后台分类列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取后台分类列表
      tags:
      - category-admin
    post:
      consumes:
      - application/json
      description: 创建一个新分类
      parameters:
      - description: 创建分类请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/category.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 创建分类
      tags:
      - category-admin
  /api/admin/login:
    post:
      consumes:
      - application/json
      description: 使用用户账号密码登录并获取登录态
      parameters:
      - description: 登录请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/auth.UserLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户登录
      tags:
      - auth
  /api/admin/logout:
    post:
      consumes:
      - application/json
      description: 清除当前登录 Session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: 用户登出
      tags:
      - auth
  /api/admin/me:
    get:
      consumes:
      - application/json
      description: 通过 Session 获取当前登录用户信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取当前用户信息
      tags:
      - auth
  /api/admin/tags:
    get:
      consumes:
      - application/json
      description: 获取后台标签列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 获取后台标签列表
      tags:
      - tag-admin
    post:
      consumes:
      - application/json
      description: 创建一个新标签
      parameters:
      - description: 创建标签请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/tag.CreateTagRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 创建标签
      tags:
      - tag-admin
  /api/articles:
    get:
      consumes:
      - application/json
      description: 获取已发布文章列表
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 关键词
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
      summary: 获取文章列表
      tags:
      - article
  /api/articles/{slug}:
    get:
      consumes:
      - application/json
      description: 通过 slug 获取已发布文章详情
      parameters:
      - description: 文章 slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      summary: 获取文章详情
      tags:
      - article
  /api/categories:
    get:
      consumes:
      - application/json
      description: 获取公开分类列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
      summary: 获取分类列表
      tags:
      - category
  /api/tags:
    get:
      consumes:
      - application/json
      description: 获取公开标签列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Body'
      summary: 获取标签列表
      tags:
      - tag
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

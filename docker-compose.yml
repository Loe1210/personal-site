services:
  mysql:
    image: mysql:8.4
    container_name: personal-site-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Vtmer!2023
      MYSQL_DATABASE: personal_site
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-site-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: "8888"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: Vtmer!2023
      MYSQL_DBNAME: personal_site
      MYSQL_CHARSET: utf8mb4
      SESSION_SECRET: personal-site-session-secret-change-in-production
      SITE_TITLE: Personal Site
      SITE_BASE_URL: http://localhost:8888
      UPLOAD_ROOT_DIR: static/uploads/images
      UPLOAD_PUBLIC_BASE_PATH: /static/uploads/images
      UPLOAD_MAX_IMAGE_SIZE_MB: "5"
    ports:
      - "8888:8888"
    volumes:
      - ./static/uploads:/app/static/uploads

volumes:
  mysql-data:

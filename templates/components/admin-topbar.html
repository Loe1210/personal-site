{{ define "admin-topbar" }}
<header class="admin-topbar">
  <div>
    <p class="admin-topbar__eyebrow">Control Panel</p>
    <h1 class="admin-topbar__title">{{ if .HeadingTitle }}{{ .HeadingTitle }}{{ else }}{{ .PageTitle }}{{ end }}</h1>
    <p class="admin-topbar__desc">{{ if .HeadingDescription }}{{ .HeadingDescription }}{{ else }}内容管理、结构维护与站点演进都从这里继续推进。{{ end }}</p>
  </div>
  <div class="admin-topbar__actions">
    <div class="admin-topbar__user">
      <span class="admin-topbar__user-label">Current User</span>
      <span id="admin-user-name">Loading...</span>
    </div>
    <button id="admin-logout-btn" class="admin-button admin-button--ghost" type="button">Logout</button>
  </div>
</header>
{{ end }}

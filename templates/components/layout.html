{{ define "layout-start" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .PageTitle }}</title>
  <meta name="description" content="{{ .Description }}">
  <meta name="theme-color" content="#07090c">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  {{ range .Styles }}
  <link rel="stylesheet" href="{{ . }}">
  {{ end }}
</head>
<body class="{{ .BodyClass }}">
  <div class="site-bg">
    <div class="site-bg__grid"></div>
    <div class="site-bg__glow site-bg__glow--left"></div>
    <div class="site-bg__glow site-bg__glow--right"></div>
    <div class="site-bg__vignette"></div>
    <div class="site-bg__noise"></div>
    <span class="site-bg__pixel site-bg__pixel--one"></span>
    <span class="site-bg__pixel site-bg__pixel--two"></span>
    <span class="site-bg__pixel site-bg__pixel--three"></span>
  </div>
  <div class="site-shell">
{{ end }}

{{ define "layout-end" }}
  </div>
  <script src="/static/js/background.js"></script>
  <script src="/static/js/site.js"></script>
  {{ range .Scripts }}
  <script src="{{ . }}"></script>
  {{ end }}
</body>
</html>
{{ end }}

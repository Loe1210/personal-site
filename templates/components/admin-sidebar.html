{{ define "admin-sidebar" }}
<aside class="admin-sidebar">
  <div class="admin-sidebar__brand-wrap">
    <a class="admin-sidebar__brand" href="/admin">
      <span class="admin-sidebar__brand-mark">LX</span>
      <span class="admin-sidebar__brand-text">Admin Console</span>
    </a>
    <p class="admin-sidebar__hint">Terminal Gallery / 内容控制台</p>
  </div>

  <div class="admin-sidebar__section">
    <p class="admin-sidebar__section-label">Navigation</p>
    <nav class="admin-sidebar__nav">
      <a class="admin-sidebar__link{{ if eq .Active "dashboard" }} is-active{{ end }}" href="/admin">Dashboard</a>
      <a class="admin-sidebar__link{{ if eq .Active "articles" }} is-active{{ end }}" href="/admin/articles">Articles</a>
      <a class="admin-sidebar__link{{ if eq .Active "taxonomy" }} is-active{{ end }}" href="/admin/taxonomy">Taxonomy</a>
      <a class="admin-sidebar__link" href="/" target="_blank" rel="noreferrer">View Site</a>
    </nav>
  </div>

  <div class="admin-sidebar__system">
    <p class="admin-sidebar__section-label">System</p>
    <div class="admin-sidebar__system-card">
      <span>Session Mode</span>
      <strong>ACTIVE</strong>
      <small>当前后台使用 Session 登录态与 RBAC 权限模型。</small>
    </div>
  </div>
</aside>
{{ end }}

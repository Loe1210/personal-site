{{ define "pages/admin/login.html" }}
{{ template "layout-start" . }}
<main class="admin-login-page">
  <section class="admin-login-panel">
    <div class="admin-login-panel__intro">
      <p class="admin-login-card__eyebrow">Admin Console</p>
      <h1>进入内容控制台</h1>
      <p class="admin-login-card__desc">使用你当前的 Session 账号进入后台，继续管理文章、分类、标签与站点内容。</p>
      <div class="admin-login-panel__meta">
        <span>Session Auth</span>
        <span>RBAC Ready</span>
        <span>Hertz + Thrift</span>
      </div>
    </div>

    <section class="admin-login-card">
      <p class="admin-login-card__caption">Sign in to continue</p>
      <form id="admin-login-form" class="admin-login-form">
        <label class="form-field">
          <span>Username</span>
          <input id="login-username" name="username" type="text" placeholder="Enter username" autocomplete="username" required>
        </label>
        <label class="form-field">
          <span>Password</span>
          <input id="login-password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
        </label>
        <div id="admin-login-error" class="form-error" hidden></div>
        <button id="admin-login-submit" class="admin-button admin-button--primary" type="submit">进入后台</button>
      </form>
      <a class="admin-login-back" href="/">返回站点首页</a>
    </section>
  </section>
</main>
{{ template "layout-end" . }}
{{ end }}

{{ define "pages/admin/taxonomy.html" }}
{{ template "admin-layout-start" . }}
{{ template "admin-sidebar" . }}
<section class="admin-main">
  {{ template "admin-topbar" . }}

  <div class="taxonomy-grid">
    <section class="taxonomy-card">
      <div class="taxonomy-card__header">
        <p class="admin-panel__eyebrow">Categories</p>
        <h2>分类结构</h2>
        <p>为文章建立更稳定的主题归档结构。</p>
      </div>
      <form id="category-form" class="stack-form">
        <input id="category-name" class="admin-input" type="text" placeholder="Name" required>
        <input id="category-slug" class="admin-input" type="text" placeholder="Slug" required>
        <textarea id="category-description" class="admin-textarea admin-textarea--short" rows="3" placeholder="Description"></textarea>
        <div class="stack-form__actions">
          <button id="category-submit-btn" class="admin-button admin-button--primary" type="submit">Create Category</button>
          <button id="category-cancel-btn" class="admin-button admin-button--ghost" type="button" hidden>Cancel Edit</button>
        </div>
      </form>
      <div id="category-feedback" class="admin-feedback" hidden></div>
      <div id="category-list" class="taxonomy-list"><div class="admin-empty">Loading categories...</div></div>
    </section>

    <section class="taxonomy-card">
      <div class="taxonomy-card__header">
        <p class="admin-panel__eyebrow">Tags</p>
        <h2>标签结构</h2>
        <p>为内容打上更细粒度的主题标签和技术维度。</p>
      </div>
      <form id="tag-form" class="stack-form">
        <input id="tag-name" class="admin-input" type="text" placeholder="Name" required>
        <input id="tag-slug" class="admin-input" type="text" placeholder="Slug" required>
        <textarea id="tag-description" class="admin-textarea admin-textarea--short" rows="3" placeholder="Description"></textarea>
        <div class="stack-form__actions">
          <button id="tag-submit-btn" class="admin-button admin-button--primary" type="submit">Create Tag</button>
          <button id="tag-cancel-btn" class="admin-button admin-button--ghost" type="button" hidden>Cancel Edit</button>
        </div>
      </form>
      <div id="tag-feedback" class="admin-feedback" hidden></div>
      <div id="tag-list" class="taxonomy-list"><div class="admin-empty">Loading tags...</div></div>
    </section>
  </div>
</section>
{{ template "admin-layout-end" . }}
{{ end }}

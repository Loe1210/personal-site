x-go-env: &go-env
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_USER: root
  MYSQL_PASSWORD: "123456"
  MYSQL_CHARSET: utf8mb4
  REDIS_ADDR: redis:6379
  NACOS_ADDR: nacos:8848
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  SESSION_STORE_PREFIX: "session:"
  SESSION_STORE_COOKIE_NAME: session_id
  SESSION_STORE_EXPIRE_HOUR: "2"

x-go-service: &go-service
  build:
    context: ../..
    dockerfile: Dockerfile
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_started
    nacos:
      condition: service_started
    otel-collector:
      condition: service_started
  environment:
    <<: *go-env

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "14250:14250"

  auth-service:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/auth-service/cmd
    command: ["./app", "-config", "services/auth-service/configs/config.yaml"]
    environment:
      <<: *go-env
      MYSQL_DBNAME: auth_db
      SERVICE_NAME: auth-service
    ports:
      - "9001:9001"
      - "9101:9101"

  media-service:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/media-service/cmd
    command: ["./app", "-config", "services/media-service/configs/config.yaml"]
    environment:
      <<: *go-env
      MYSQL_DBNAME: media_db
    ports:
      - "9002:9002"
    volumes:
      - upload-images-data:/app/static/uploads/images
      - upload-tmp-data:/app/static/uploads/tmp

  content-service:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/content-service/cmd
    command: ["./app", "-config", "services/content-service/configs/config.yaml"]
    environment:
      <<: *go-env
      MYSQL_DBNAME: content_db
      SERVICE_NAME: content-service
    ports:
      - "9003:9003"
      - "9103:9103"

  gateway:
    <<: *go-service
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/gateway/cmd
    command: ["./app", "-config", "configs/config.yaml"]
    environment:
      <<: *go-env
      APP_PORT: "8888"
      AUTH_SERVICE_URL: http://auth-service:9001
      AUTH_SERVICE_NAME: auth-service
      AUTH_RPC_ADDR: auth-service:9101
      MEDIA_SERVICE_URL: http://media-service:9002
      CONTENT_SERVICE_URL: http://content-service:9003
      CONTENT_SERVICE_NAME: content-service
      CONTENT_RPC_ADDR: content-service:9103
    ports:
      - "8888:8888"

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - upload-images-data:/usr/share/nginx/html/static/uploads/images

volumes:
  mysql-data:
  upload-images-data:
  upload-tmp-data:



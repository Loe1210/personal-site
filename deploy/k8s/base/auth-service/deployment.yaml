apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: personal-site/auth-service:latest
          ports:
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: personal-site-config
            - secretRef:
                name: personal-site-secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 9001
      targetPort: 9001
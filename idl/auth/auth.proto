syntax = "proto3";

package auth;

option go_package = "github.com/Loe1210/personal-site/kitex_gen/auth;auth";

import "base/base.proto";

message AuthContext {
  int64 user_id = 1;
  string username = 2;
  repeated string roles = 3;
  base.BaseResp base_resp = 100;
}

message ValidateSessionRequest {
  string session_id = 1;
}

message CheckPermissionRequest {
  int64 user_id = 1;
  string code = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
  base.BaseResp base_resp = 100;
}

service AuthService {
  rpc ValidateSession(ValidateSessionRequest) returns (AuthContext);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
}

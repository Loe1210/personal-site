syntax = "proto3";

package article;

option go_package = "personal_site/biz/model/article;article";

message Article {
  int64 id = 1;
  string title = 2;
  string slug = 3;
  string summary = 4;
  string content_md = 5;
  string content_html = 6;
  string cover_image = 7;
  int64 category_id = 8;
  repeated int64 tag_ids = 9;
  string status = 10;
  string created_at = 11;
  string updated_at = 12;
  string published_at = 13;
}

message CreateArticleRequest {
  string title = 1;
  string slug = 2;
  string summary = 3;
  string content_md = 4;
  string cover_image = 5;
  int64 category_id = 6;
  repeated int64 tag_ids = 7;
  string status = 8;
}

message CreateArticleResponse {
  Article article = 1;
  string message = 2;
}

message UpdateArticleRequest {
  int64 id = 1;
  string title = 2;
  string slug = 3;
  string summary = 4;
  string content_md = 5;
  string cover_image = 6;
  int64 category_id = 7;
  repeated int64 tag_ids = 8;
  string status = 9;
}

message UpdateArticleResponse {
  Article article = 1;
  string message = 2;
}

message DeleteArticleRequest {
  int64 id = 1;
}

message DeleteArticleResponse {
  bool success = 1;
  string message = 2;
}

message GetArticleByIDRequest {
  int64 id = 1;
}

message GetArticleBySlugRequest {
  string slug = 1;
}

message GetArticleResponse {
  Article article = 1;
}

message ListArticlesRequest {
  int64 page = 1;
  int64 page_size = 2;
  string tag = 3;
  string category = 4;
  string keyword = 5;
  string status = 6;
}

message ListAdminArticlesRequest {
  int64 page = 1;
  int64 page_size = 2;
  string status = 3;
  string keyword = 4;
}

message ListArticlesResponse {
  repeated Article list = 1;
  int64 total = 2;
  int64 page = 3;
  int64 page_size = 4;
}

message PublishArticleRequest {
  int64 id = 1;
  string status = 2;
}

message PublishArticleResponse {
  Article article = 1;
  string message = 2;
}

service ArticleService {
  rpc CreateArticle(CreateArticleRequest) returns (CreateArticleResponse);
  rpc UpdateArticle(UpdateArticleRequest) returns (UpdateArticleResponse);
  rpc DeleteArticle(DeleteArticleRequest) returns (DeleteArticleResponse);
  rpc GetArticleByID(GetArticleByIDRequest) returns (GetArticleResponse);
  rpc GetArticleBySlug(GetArticleBySlugRequest) returns (GetArticleResponse);
  rpc ListArticles(ListArticlesRequest) returns (ListArticlesResponse);
  rpc ListAdminArticles(ListAdminArticlesRequest) returns (ListArticlesResponse);
  rpc PublishArticle(PublishArticleRequest) returns (PublishArticleResponse);
}

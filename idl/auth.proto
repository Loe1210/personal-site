syntax = "proto3";

package auth;

option go_package = "personal_site/biz/model/auth;auth";

message AdminUser {
  int64 id = 1;
  string username = 2;
  string nickname = 3;
  string created_at = 4;
  string updated_at = 5;
}

message AdminLoginRequest {
  string username = 1;
  string password = 2;
}

message AdminLoginResponse {
  string token = 1;
  string expires_at = 2;
  AdminUser user = 3;
}

message GetCurrentAdminRequest {}

message GetCurrentAdminResponse {
  AdminUser user = 1;
}

message RefreshAdminTokenRequest {
  string token = 1;
}

message RefreshAdminTokenResponse {
  string token = 1;
  string expires_at = 2;
}

service AuthService {
  rpc AdminLogin(AdminLoginRequest) returns (AdminLoginResponse);
  rpc GetCurrentAdmin(GetCurrentAdminRequest) returns (GetCurrentAdminResponse);
  rpc RefreshAdminToken(RefreshAdminTokenRequest) returns (RefreshAdminTokenResponse);
}

syntax = "proto3";

package upload;

option go_package = "personal_site/biz/model/upload;upload";

message UploadFile {
  int64 file_id = 1;
  string file_name = 2;
  string file_url = 3;
  string file_path = 4;
  string mime_type = 5;
  int64 size = 6;
  string biz_type = 7;
  string created_at = 8;
}

message UploadImageRequest {
  string biz_type = 1;
}

message UploadImageResponse {
  UploadFile upload = 1;
}

message GetUploadInfoRequest {
  int64 id = 1;
}

message GetUploadInfoResponse {
  UploadFile upload = 1;
}

service UploadService {
  rpc UploadImage(UploadImageRequest) returns (UploadImageResponse);
  rpc GetUploadInfo(GetUploadInfoRequest) returns (GetUploadInfoResponse);
}

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Hins 的技术博客 - 实习产出与学习笔记">
    <title>Hins 的技术博客</title>
    <link rel="stylesheet" href="/assets/css/iconfont.css">
    <link rel="stylesheet" href="/assets/css/vno.css">
    <link rel="stylesheet" href="/blog/css/blog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico">
</head>

<body>
    <div class="blog-overlay"></div>

    <a href="/" class="blog-back" title="返回首页">&larr; 首页</a>
    <a href="/admin/" class="admin-entry-btn" title="进入管理后台">&#9881;</a>

    <!-- 主体 -->
    <main class="blog-container">
        <h1 class="blog-page-title">Hins 的技术博客</h1>
        <p class="blog-page-subtitle">记录实习产出，分享学习所得</p>

        <div class="blog-search">
            <span class="blog-search__icon">&#128269;</span>
            <input type="text" id="searchInput" class="blog-search__input" placeholder="搜索文章标题或摘要...">
        </div>

        <div class="blog-layout">
            <!-- 主内容区 -->
            <div class="blog-main">
                <!-- 文章列表 -->
                <div id="postList" class="post-list">
                    <div class="blog-loading">加载中...</div>
                </div>

                <!-- 分页 -->
                <div id="pagination" class="blog-pagination" style="display:none;">
                    <button id="prevPage" class="blog-pagination__btn">&laquo; 上一页</button>
                    <div id="pageNumbers" class="blog-pagination__numbers"></div>
                    <button id="nextPage" class="blog-pagination__btn">下一页 &raquo;</button>
                </div>
            </div>

            <!-- 右侧栏 -->
            <aside class="blog-aside">
                <!-- 分类 -->
                <section id="categories" class="blog-sidebar">
                    <h3 class="blog-sidebar__title">分类</h3>
                    <div id="categoryChips" class="blog-sidebar__chips">
                        <span class="blog-loading">加载中...</span>
                    </div>
                </section>

                <!-- 标签 -->
                <section id="tags" class="blog-sidebar">
                    <h3 class="blog-sidebar__title">标签</h3>
                    <div id="tagChips" class="blog-sidebar__chips">
                        <span class="blog-loading">加载中...</span>
                    </div>
                </section>
            </aside>
        </div>
    </main>

    <button id="backToTop" class="back-to-top" title="返回顶部">&#8593;</button>

    <script src="/blog/js/api.js"></script>
    <script src="/blog/js/list.js"></script>
</body>

</html>
